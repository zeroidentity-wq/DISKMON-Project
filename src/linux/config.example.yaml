mail_enabled: true  # Enable or disable email alerts
smtp_server: smtp.example.com  # SMTP server address
smtp_port: 587  # SMTP server port
smtp_user: user@example.com  # SMTP username (leave blank if not required)
smtp_pass: password  # SMTP password (leave blank if not required)
email_from: admin@example.com  # Sender email address
email_to: alerts@example.com  # Recipient email address
smtp_security: starttls  # SMTP security: none, starttls, or ssl
warning_threshold_percent: 85.0  # Severitate WARNING cand ocuparea ajunge la acest procent
critical_threshold_percent: 90.0  # Severitate CRITICAL cand ocuparea ajunge la acest procent
emergency_threshold_percent: 95.0  # Severitate EMERGENCY cand ocuparea ajunge la acest procent
alert_cooldown_hours: 12  # Retrimite reminder doar dupa acest interval cat timp alerta ramane activa
recovery_threshold_percent: 82.0  # Marcheaza revenirea cand ocuparea scade la acest procent sau mai jos
send_recovery_email: true  # Trimite email cand un mount point revine sub pragul de recovery
excluded_disks: [""]  # List of disks to exclude (Linux: e.g. ["sda", "nvme0n1"]; Windows: e.g. ["C:", "D:"])
friendly_name: "Example device"  # Optional: friendly name for this device in reports
